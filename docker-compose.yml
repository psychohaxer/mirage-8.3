services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        APP_UID: ${UID:-1000}
        APP_GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    container_name: ${APP_CONTAINER_NAME:-mirage_app}
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html
    networks:
      - mirage_net
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: ${WEB_CONTAINER_NAME:-mirage_web}
    ports:
      - "${PORT_WEB:-8080}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - mirage_net
    restart: unless-stopped

  db:
    image: linuxserver/mariadb:latest
    container_name: ${DB_CONTAINER_NAME:-mirage_db}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mirage_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-mirage_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mirage_pass}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - mirage_net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    build:
      context: ./docker/phpmyadmin
      dockerfile: Dockerfile
    container_name: ${PMA_CONTAINER_NAME:-mirage_phpmyadmin}
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-mirage_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-mirage_pass}
    ports:
      - "${PORT_PMA:-8081}:80"
    depends_on:
      - db
    networks:
      - mirage_net
    restart: unless-stopped

networks:
  mirage_net:

volumes:
  dbdata:
