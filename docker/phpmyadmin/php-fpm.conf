[www]
user = nginx
group = nginx
listen = 127.0.0.1:9000
listen.owner = nginx
listen.group = nginx
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; Keep environment variables from the container available to PHP-FPM
clear_env = no

; Forward phpMyAdmin-related env vars to PHP processes (optional but explicit)
env[PMA_HOST] = $PMA_HOST
env[PMA_USER] = $PMA_USER
env[PMA_PASSWORD] = $PMA_PASSWORD
